<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - النسخة النهائية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #0f172a;
      --border: #e2e8f0;
      --accent: #1e293b;
    }
    
    body.dark {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --border: #334155;
      --accent: #64748b;
    }
    
    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: all 0.3s;
    }
    
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .logo h1 { font-size: 1.3rem; }
    
    .theme-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 30px;
      cursor: pointer;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem;
    }
    
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
      flex-wrap: wrap;
    }
    
    .tab-btn {
      background: transparent;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      color: var(--text);
    }
    
    .tab-btn.active {
      background: var(--accent);
      color: white;
    }
    
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 1.2rem;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
    }
    
    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
    }
    
    .form-group {
      margin-bottom: 0.8rem;
    }
    
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.3rem;
      font-size: 0.8rem;
    }
    
    .form-group input, .form-group select {
      width: 100%;
      padding: 0.5rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      color: var(--text);
    }
    
    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
    }
    
    .btn-danger { background: #ef4444; }
    .btn-danger:hover { background: #dc2626; }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th, td {
      padding: 0.6rem;
      text-align: right;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    
    .stat-card {
      background: var(--card);
      border-radius: 16px;
      padding: 1rem;
      text-align: center;
      border: 1px solid var(--border);
    }
    
    .stat-card .number {
      font-size: 1.6rem;
      font-weight: 800;
    }
    
    .status-bar {
      background: var(--accent);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 30px;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      text-align: center;
    }
    
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1e293b;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 30px;
      z-index: 1000;
      opacity: 0;
      transition: 0.3s;
    }
    
    .toast.show { opacity: 1; }
    
    @media (max-width: 768px) {
      .top-bar { padding: 0.8rem 1rem; }
      .container { padding: 1rem; }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="logo"><h1>🛍️ Admin Panel</h1></div>
  <button class="theme-btn" id="themeBtn">🌙 ليلي</button>
</div>

<div class="container">
  <!-- حالة الاتصال -->
  <div class="status-bar" id="statusBar">
    🔄 جاري الاتصال بقاعدة البيانات...
  </div>
  
  <!-- التبويبات -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="dashboard">📊 الرئيسية</button>
    <button class="tab-btn" data-tab="products">📦 المنتجات</button>
    <button class="tab-btn" data-tab="categories">🏷️ الأقسام</button>
  </div>

  <!-- تبويب الرئيسية -->
  <div id="dashboardTab" class="tab-pane">
    <div class="stats">
      <div class="stat-card"><h3>المنتجات</h3><div class="number" id="statProducts">0</div></div>
      <div class="stat-card"><h3>الأقسام</h3><div class="number" id="statCategories">0</div></div>
    </div>
    <div class="card">
      <h2>✅ لوحة التحكم</h2>
      <p>يمكنك إدارة المنتجات والأقسام من التبويبات أعلاه.</p>
      <p style="margin-top:0.5rem; font-size:0.8rem; color:var(--accent)">📌 ملاحظة: جميع التغييرات تظهر فوراً في الموقع الرئيسي</p>
    </div>
  </div>

  <!-- تبويب المنتجات -->
  <div id="productsTab" class="tab-pane" style="display:none">
    <div class="card">
      <h2>➕ إضافة منتج جديد</h2>
      <div class="form-group">
        <label>اسم المنتج</label>
        <input type="text" id="prodName" placeholder="مثال: جاكيت جلد">
      </div>
      <div class="form-group">
        <label>القسم</label>
        <select id="prodCategory"></select>
      </div>
      <div class="form-group">
        <label>ترتيب العرض</label>
        <input type="number" id="prodOrder" placeholder="10">
      </div>
      <button id="addProductBtn">➕ إضافة منتج</button>
    </div>
    
    <div class="card">
      <h2>📋 قائمة المنتجات</h2>
      <div style="overflow-x:auto">
        <table id="productsTable">
          <thead><tr><th>المنتج</th><th>القسم</th><th>الترتيب</th><th></th></tr></thead>
          <tbody id="productsList"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- تبويب الأقسام -->
  <div id="categoriesTab" class="tab-pane" style="display:none">
    <div class="card">
      <h2>➕ إضافة قسم جديد</h2>
      <div class="form-group">
        <label>اسم القسم</label>
        <input type="text" id="catName" placeholder="مثال: شتوي">
      </div>
      <button id="addCategoryBtn">➕ إضافة قسم</button>
    </div>
    
    <div class="card">
      <h2>📋 الأقسام الموجودة</h2>
      <div id="categoriesList"></div>
    </div>
  </div>
</div>

<div id="toastMsg" class="toast">✅ تم</div>

<script type="module">
  // استيراد Firebase
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getDatabase, ref, set, push, onValue, remove, get, child } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
  
  // إعدادات Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyDDVYttBm00kFOHTz8Ba5FQSU2I70qIky8",
    authDomain: "yassen-web.firebaseapp.com",
    projectId: "yassen-web",
    storageBucket: "yassen-web.firebasestorage.app",
    messagingSenderId: "314231686384",
    appId: "1:314231686384:web:d3fe1b3495ad3deca56e35",
    measurementId: "G-VZ9YTBEDP1"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  
  let products = [];
  let categories = [];
  let isConnected = false;
  
  const statusBar = document.getElementById('statusBar');
  
  function showToast(msg, isError = false) {
    const toast = document.getElementById('toastMsg');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }
  
  // اختبار الكتابة في Firebase
  async function testWrite() {
    try {
      const testRef = ref(db, 'test_write');
      await set(testRef, { value: Date.now(), message: "test" });
      console.log("✅ الكتابة في Firebase تعمل");
      statusBar.innerHTML = '✅ متصل بقاعدة البيانات - جاهز للإضافة';
      statusBar.style.background = '#10b981';
      isConnected = true;
      return true;
    } catch (error) {
      console.error("❌ خطأ في الكتابة:", error);
      statusBar.innerHTML = '❌ خطأ في الاتصال! تأكد من قواعد الأمان في Firebase';
      statusBar.style.background = '#ef4444';
      isConnected = false;
      showToast('❌ خطأ في الاتصال بقاعدة البيانات', true);
      return false;
    }
  }
  
  // تحميل البيانات
  function loadData() {
    // تحميل المنتجات
    const productsRef = ref(db, 'products');
    onValue(productsRef, (snapshot) => {
      const data = snapshot.val();
      if (data) {
        products = Object.entries(data).map(([id, val]) => ({ ...val, firebaseId: id }));
      } else {
        products = [];
      }
      updateProductsUI();
      updateStats();
    }, (error) => {
      console.error('خطأ في تحميل المنتجات:', error);
      statusBar.innerHTML = '❌ فشل تحميل المنتجات';
    });
    
    // تحميل الأقسام
    const categoriesRef = ref(db, 'categories');
    onValue(categoriesRef, (snapshot) => {
      const data = snapshot.val();
      if (data) {
        categories = Object.entries(data).map(([id, val]) => ({ ...val, firebaseId: id }));
      } else {
        categories = [];
      }
      updateCategorySelect();
      updateCategoriesUI();
      updateStats();
    }, (error) => {
      console.error('خطأ في تحميل الأقسام:', error);
    });
  }
  
  function updateProductsUI() {
    const tbody = document.getElementById('productsList');
    if (!tbody) return;
    
    if (products.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center">✨ لا توجد منتجات. أضف منتجك الأول ✨</td></tr>';
      return;
    }
    
    tbody.innerHTML = products.map(p => {
      const cat = categories.find(c => c.id === p.categoryId);
      return `
        <tr>
          <td><strong>${escapeHtml(p.name)}</strong></td>
          <td><span style="background:var(--accent); color:white; padding:0.2rem 0.5rem; border-radius:20px; font-size:0.7rem">${cat ? escapeHtml(cat.name) : 'بدون قسم'}</span></td>
          <td>${p.displayOrder || 'auto'}</td>
          <td><button class="deleteProductBtn" data-id="${p.firebaseId}" style="background:#ef4444; padding:0.2rem 0.6rem; border:none; border-radius:20px; color:white; cursor:pointer">🗑️ حذف</button></td>
        </tr>
      `;
    }).join('');
    
    document.querySelectorAll('.deleteProductBtn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.getAttribute('data-id');
        if (confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
          try {
            await remove(ref(db, `products/${id}`));
            showToast('✅ تم حذف المنتج');
          } catch (error) {
            showToast('❌ فشل الحذف: ' + error.message, true);
          }
        }
      });
    });
  }
  
  function updateCategoriesUI() {
    const container = document.getElementById('categoriesList');
    if (!container) return;
    
    if (categories.length === 0) {
      container.innerHTML = '<p>✨ لا توجد أقسام. أضف قسمك الأول ✨</p>';
      return;
    }
    
    container.innerHTML = categories.map(c => `
      <div style="display:flex; justify-content:space-between; align-items:center; padding:0.5rem; border-bottom:1px solid var(--border)">
        <span><i class="fas fa-tag"></i> ${escapeHtml(c.name)}</span>
        <button class="deleteCategoryBtn" data-id="${c.firebaseId}" style="background:#ef4444; padding:0.2rem 0.6rem; border:none; border-radius:20px; color:white; cursor:pointer">🗑️ حذف</button>
      </div>
    `).join('');
    
    document.querySelectorAll('.deleteCategoryBtn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.getAttribute('data-id');
        const catToDelete = categories.find(c => c.firebaseId === id);
        if (products.some(p => p.categoryId === catToDelete?.id)) {
          showToast('⚠️ لا يمكن حذف القسم لأنه يحتوي على منتجات');
          return;
        }
        if (confirm('هل أنت متأكد من حذف هذا القسم؟')) {
          try {
            await remove(ref(db, `categories/${id}`));
            showToast('✅ تم حذف القسم');
          } catch (error) {
            showToast('❌ فشل الحذف: ' + error.message, true);
          }
        }
      });
    });
  }
  
  function updateCategorySelect() {
    const select = document.getElementById('prodCategory');
    if (select) {
      if (categories.length === 0) {
        select.innerHTML = '<option>لا توجد أقسام</option>';
      } else {
        select.innerHTML = categories.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
      }
    }
  }
  
  function updateStats() {
    document.getElementById('statProducts').innerText = products.length;
    document.getElementById('statCategories').innerText = categories.length;
  }
  
  async function addProduct() {
    if (!isConnected) {
      showToast('⚠️ لا يوجد اتصال بقاعدة البيانات', true);
      return;
    }
    
    const name = document.getElementById('prodName').value.trim();
    const categoryId = document.getElementById('prodCategory').value;
    const order = parseInt(document.getElementById('prodOrder').value) || 999;
    
    if (!name) {
      showToast('⚠️ الرجاء إدخال اسم المنتج');
      return;
    }
    
    if (categories.length === 0) {
      showToast('⚠️ الرجاء إضافة قسم أولاً');
      return;
    }
    
    try {
      const newProduct = {
        name: name,
        categoryId: categoryId,
        displayOrder: order,
        createdAt: Date.now()
      };
      
      await push(ref(db, 'products'), newProduct);
      
      document.getElementById('prodName').value = '';
      document.getElementById('prodOrder').value = '';
      
      showToast('✅ تم إضافة المنتج بنجاح');
    } catch (error) {
      showToast('❌ فشل الإضافة: ' + error.message, true);
    }
  }
  
  async function addCategory() {
    if (!isConnected) {
      showToast('⚠️ لا يوجد اتصال بقاعدة البيانات', true);
      return;
    }
    
    const name = document.getElementById('catName').value.trim();
    
    if (!name) {
      showToast('⚠️ الرجاء إدخال اسم القسم');
      return;
    }
    
    if (categories.some(c => c.name === name)) {
      showToast('⚠️ هذا القسم موجود مسبقاً');
      return;
    }
    
    try {
      const newCategory = { id: 'cat_' + Date.now(), name: name };
      await push(ref(db, 'categories'), newCategory);
      
      document.getElementById('catName').value = '';
      showToast('✅ تم إضافة القسم بنجاح');
    } catch (error) {
      showToast('❌ فشل الإضافة: ' + error.message, true);
    }
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  // التبويبات
  function switchTab(tabId) {
    document.getElementById('dashboardTab').style.display = 'none';
    document.getElementById('productsTab').style.display = 'none';
    document.getElementById('categoriesTab').style.display = 'none';
    document.getElementById(tabId + 'Tab').style.display = 'block';
    
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
  }
  
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.getAttribute('data-tab');
      switchTab(tab);
    });
  });
  
  // الوضع الليلي
  let isDark = localStorage.getItem('darkMode') === 'true';
  function applyTheme() {
    if (isDark) {
      document.body.classList.add('dark');
      document.getElementById('themeBtn').innerHTML = '☀️ نهاري';
    } else {
      document.body.classList.remove('dark');
      document.getElementById('themeBtn').innerHTML = '🌙 ليلي';
    }
  }
  
  document.getElementById('themeBtn').addEventListener('click', () => {
    isDark = !isDark;
    localStorage.setItem('darkMode', isDark);
    applyTheme();
  });
  applyTheme();
  
  // ربط الأزرار
  document.getElementById('addProductBtn').addEventListener('click', addProduct);
  document.getElementById('addCategoryBtn').addEventListener('click', addCategory);
  
  // بدء التطبيق
  await testWrite();
  loadData();
</script>
</body>
</html>
